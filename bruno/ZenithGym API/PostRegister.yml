info:
  name: PostRegister
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/auth/register
  body:
    type: json
    data: |-
      {
        "firstName": "Joshua",
        "lastName": "Aboytes",
        "email": "joshua@example.com",
        "password": "Password123!",
        "role": "admin",
        "phone": "5512345678"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
